# ============================================================
# William / Jarvis Multi-Agent AI SaaS System
# Digital Promotix
# File: deploy/nginx/william.conf
# Purpose: Nginx reverse proxy config
# Agent/Module: Deployment Prompt Bible
# Required class/component name: William
# ============================================================
#
# This file is designed for a production VPS or cloud VM where:
# - Nginx runs on the host or inside a reverse-proxy container.
# - The API runs on localhost:8000 or Docker service api:8000.
# - The dashboard runs on localhost:3000 or Docker service dashboard:3000.
#
# Security / SaaS isolation notes:
# - Nginx does NOT enforce user_id/workspace_id isolation by itself.
# - The William API must enforce user_id and workspace_id on every task,
#   memory record, file, audit log, analytics event, billing record,
#   workflow, and agent access request.
# - Sensitive and state-changing actions must route through the Security Agent.
# - Completed actions should produce Verification Agent payloads.
# - Nginx blocks direct access to hidden files, env files, source maps,
#   backups, database dumps, and common secret/config paths.
# - No real secrets are stored here.
#
# Replace these examples before production:
# - william.example.com
# - api.william.example.com
#
# Recommended:
# - Use Certbot or your cloud load balancer for TLS.
# - Keep PostgreSQL and Redis private; do not proxy them through Nginx.
# ============================================================


# ------------------------------------------------------------
# WebSocket upgrade helper
# ------------------------------------------------------------
# Required for:
# - Live task events
# - Agent event streams
# - Dashboard notifications
# - Voice/system/browser worker events if exposed through API
# ------------------------------------------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}


# ------------------------------------------------------------
# Basic rate-limit zones
# ------------------------------------------------------------
# These are safe defaults. They reduce abuse but do not replace
# application-level authentication, role checks, subscription checks,
# audit logs, Security Agent approvals, or fraud controls.
# ------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=william_general_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=william_api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=william_auth_limit:10m rate=5r/m;


# ------------------------------------------------------------
# Upstreams
# ------------------------------------------------------------
# For Docker Compose Nginx service:
#   server api:8000;
#   server dashboard:3000;
#
# For host-installed Nginx with exposed Docker ports:
#   server 127.0.0.1:8000;
#   server 127.0.0.1:3000;
#
# Current default uses host-local ports because this config is placed
# under deploy/nginx and commonly installed on the VPS host.
# ------------------------------------------------------------
upstream william_api_upstream {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream william_dashboard_upstream {
    server 127.0.0.1:3000;
    keepalive 32;
}


# ============================================================
# HTTP server
# ============================================================
# Redirect HTTP to HTTPS in production.
# Certbot may temporarily use /.well-known/acme-challenge/.
# ============================================================
server {
    listen 80;
    listen [::]:80;

    server_name william.example.com api.william.example.com;

    # Certbot / Let's Encrypt challenge path
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        allow all;
    }

    # Health endpoint can stay available on HTTP for load balancers.
    # It must never leak secrets, users, workspaces, memory, billing,
    # audit logs, files, or agent payloads.
    location = /health {
        proxy_pass http://william_api_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/health {
        proxy_pass http://william_api_upstream/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else should use HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}


# ============================================================
# HTTPS server
# ============================================================
# Main app domain:
# - Dashboard at /
# - API at /api/
# - WebSockets at /ws/ and /api/ws/
# ============================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name william.example.com;

    # --------------------------------------------------------
    # TLS certificates
    # --------------------------------------------------------
    # Use Certbot paths or your own certificate paths.
    # These are examples only and contain no secrets.
    # --------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/william.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/william.example.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:WilliamSSL:10m;
    ssl_session_tickets off;

    # --------------------------------------------------------
    # Safe request limits
    # --------------------------------------------------------
    # Increase client_max_body_size only if your app supports
    # workspace-scoped file upload validation and malware scanning.
    # --------------------------------------------------------
    client_max_body_size 25m;
    client_body_timeout 30s;
    client_header_timeout 30s;
    keepalive_timeout 65s;
    send_timeout 60s;

    # --------------------------------------------------------
    # Logs
    # --------------------------------------------------------
    # Avoid logging Authorization headers or request bodies.
    # Application audit logs should be handled by the API.
    # --------------------------------------------------------
    access_log /var/log/nginx/william_access.log;
    error_log  /var/log/nginx/william_error.log warn;

    # --------------------------------------------------------
    # Security headers
    # --------------------------------------------------------
    # CSP is intentionally conservative but allows common dashboard/API
    # needs. Tighten connect-src to your exact domains in production.
    # --------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; img-src 'self' data: blob: https:; font-src 'self' data: https:; style-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; connect-src 'self' https: wss: ws:; worker-src 'self' blob:;" always;

    # --------------------------------------------------------
    # Block sensitive files and paths
    # --------------------------------------------------------
    # This prevents accidental exposure of secrets, source files,
    # dependency manifests, logs, database dumps, backups, and env files.
    # --------------------------------------------------------
    location ~* (^|/)\. {
        deny all;
        return 404;
    }

    location ~* \.(env|ini|log|sql|sqlite|db|bak|backup|old|orig|save|swp|pem|key|crt|csr|p12|pfx|yml|yaml|toml|lock)$ {
        deny all;
        return 404;
    }

    location ~* /(Dockerfile|docker-compose\.yml|requirements\.txt|requirements-prod\.txt|pyproject\.toml|poetry\.lock|package\.json|package-lock\.json|pnpm-lock\.yaml|yarn\.lock|README|CHANGELOG|LICENSE)(/)?$ {
        deny all;
        return 404;
    }

    location ~* /(config|configs|secrets|private|storage|logs|tmp|database|migrations|alembic|tests|\.git|\.github|\.idea|\.vscode)(/|$) {
        deny all;
        return 404;
    }

    # --------------------------------------------------------
    # Health endpoints
    # --------------------------------------------------------
    # Must be safe and minimal. No user/workspace/memory/billing/log
    # information should be returned by the application.
    # --------------------------------------------------------
    location = /health {
        limit_req zone=william_general_limit burst=20 nodelay;

        proxy_pass http://william_api_upstream/health;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    location = /api/health {
        limit_req zone=william_general_limit burst=20 nodelay;

        proxy_pass http://william_api_upstream/api/health;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # --------------------------------------------------------
    # Authentication routes
    # --------------------------------------------------------
    # Extra rate limiting for login/register/password/token endpoints.
    # The API must still enforce safe errors, audit logs, lockouts,
    # MFA if enabled, role checks, and subscription checks.
    # --------------------------------------------------------
    location ~ ^/api/(auth|login|register|token|password|oauth) {
        limit_req zone=william_auth_limit burst=10 nodelay;

        proxy_pass http://william_api_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering off;
    }

    # --------------------------------------------------------
    # API routes
    # --------------------------------------------------------
    # Routes all /api traffic to FastAPI.
    #
    # API responsibilities:
    # - Enforce authenticated user_id and selected workspace_id.
    # - Reject cross-workspace data access.
    # - Enforce role, permission, plan, and subscription checks.
    # - Route sensitive actions through Security Agent approvals.
    # - Write audit logs for state-changing operations.
    # - Emit Verification Agent payloads after completed actions.
    # - Return structured safe errors.
    # --------------------------------------------------------
    location /api/ {
        limit_req zone=william_api_limit burst=40 nodelay;

        proxy_pass http://william_api_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;

        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        proxy_buffering off;
    }

    # --------------------------------------------------------
    # Internal agent routes
    # --------------------------------------------------------
    # Public internet should not directly call internal agent endpoints.
    # These should be service-to-service only.
    #
    # If your deployment needs these routes externally, remove this block
    # only after implementing signed service tokens, IP allowlisting,
    # audit logs, Security Agent approvals, and strict workspace scoping.
    # --------------------------------------------------------
    location ~ ^/(internal|agents/internal|api/internal)/ {
        deny all;
        return 404;
    }

    # --------------------------------------------------------
    # WebSocket routes
    # --------------------------------------------------------
    # Supports live dashboard updates, agent task streams,
    # system events, and notification channels.
    #
    # The API must authenticate each connection and bind it to the
    # correct user_id and workspace_id before sending any event.
    # --------------------------------------------------------
    location /ws/ {
        limit_req zone=william_api_limit burst=30 nodelay;

        proxy_pass http://william_api_upstream;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;

        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        proxy_buffering off;
    }

    location /api/ws/ {
        limit_req zone=william_api_limit burst=30 nodelay;

        proxy_pass http://william_api_upstream;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;

        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        proxy_buffering off;
    }

    # --------------------------------------------------------
    # Static asset caching for dashboard
    # --------------------------------------------------------
    # Next.js assets are hashed, so long cache is safe.
    # --------------------------------------------------------
    location /_next/static/ {
        proxy_pass http://william_dashboard_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(?:css|js|mjs|map|ico|jpg|jpeg|png|gif|webp|svg|woff|woff2|ttf|otf)$ {
        proxy_pass http://william_dashboard_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # --------------------------------------------------------
    # Dashboard routes
    # --------------------------------------------------------
    # Routes all non-API pages to Next.js dashboard.
    #
    # Dashboard responsibilities:
    # - Use authenticated API client.
    # - Include selected workspace context in API calls.
    # - Show/hide UI based on role/plan/permission.
    # - Use loading, error, empty, and denied states.
    # - Never directly access database or Redis.
    # --------------------------------------------------------
    location / {
        limit_req zone=william_general_limit burst=60 nodelay;

        proxy_pass http://william_dashboard_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        proxy_buffering off;
    }

    # --------------------------------------------------------
    # Safe error pages
    # --------------------------------------------------------
    # These return generic responses and do not reveal backend details.
    # --------------------------------------------------------
    error_page 400 401 403 404 /safe-404;
    error_page 500 502 503 504 /safe-50x;

    location = /safe-404 {
        internal;
        default_type application/json;
        return 404 '{"ok":false,"error":{"code":"not_found","message":"The requested resource was not found."}}';
    }

    location = /safe-50x {
        internal;
        default_type application/json;
        return 503 '{"ok":false,"error":{"code":"service_unavailable","message":"Service temporarily unavailable."}}';
    }
}


# ============================================================
# Optional dedicated API subdomain
# ============================================================
# Use this if you want:
# - Dashboard: https://william.example.com
# - API:       https://api.william.example.com
#
# You can remove this server block if you only use /api on the
# main app domain.
# ============================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name api.william.example.com;

    ssl_certificate     /etc/letsencrypt/live/api.william.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.william.example.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:WilliamApiSSL:10m;
    ssl_session_tickets off;

    client_max_body_size 25m;
    client_body_timeout 30s;
    client_header_timeout 30s;
    keepalive_timeout 65s;
    send_timeout 60s;

    access_log /var/log/nginx/william_api_access.log;
    error_log  /var/log/nginx/william_api_error.log warn;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    location ~* (^|/)\. {
        deny all;
        return 404;
    }

    location ~* \.(env|ini|log|sql|sqlite|db|bak|backup|old|orig|save|swp|pem|key|crt|csr|p12|pfx|yml|yaml|toml|lock)$ {
        deny all;
        return 404;
    }

    location = /health {
        limit_req zone=william_general_limit burst=20 nodelay;

        proxy_pass http://william_api_upstream/health;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    location /ws/ {
        limit_req zone=william_api_limit burst=30 nodelay;

        proxy_pass http://william_api_upstream;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;

        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        proxy_buffering off;
    }

    location ~ ^/(internal|agents/internal|api/internal)/ {
        deny all;
        return 404;
    }

    location / {
        limit_req zone=william_api_limit burst=40 nodelay;

        proxy_pass http://william_api_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;

        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        proxy_buffering off;
    }

    error_page 400 401 403 404 /safe-api-404;
    error_page 500 502 503 504 /safe-api-50x;

    location = /safe-api-404 {
        internal;
        default_type application/json;
        return 404 '{"ok":false,"error":{"code":"not_found","message":"The requested API resource was not found."}}';
    }

    location = /safe-api-50x {
        internal;
        default_type application/json;
        return 503 '{"ok":false,"error":{"code":"service_unavailable","message":"API service temporarily unavailable."}}';
    }
}