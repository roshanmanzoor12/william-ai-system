[alembic]
# William / Jarvis Multi-Agent AI SaaS System -- Digital Promotix
# Alembic configuration. The actual database URL is resolved at runtime by
# database/migrations/env.py from DATABASE_URL / WILLIAM_DATABASE_URL /
# JARVIS_DATABASE_URL / SQLALCHEMY_DATABASE_URI / DB_URL (in that order),
# falling back to a local SQLite file only in non-production environments.
# The placeholder below is intentionally never used -- see Env.get_database_url_from_config.
sqlalchemy.url = driver://user:pass@localhost/dbname

script_location = database/migrations
version_locations = database/migrations/versions
prepend_sys_path = .

file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

timezone = UTC
truncate_slug_length = 40

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
